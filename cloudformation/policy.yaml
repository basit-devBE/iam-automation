AWSTemplateFormatVersion: '2010-09-09'
Description: >
  IAM Resources Lab - Creating IAM users, groups, policies, temporary credentials stored in Secrets Manager

Resources:
  TemporaryCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: TemporaryCredentials
      Description: "Temporary credentials for IAM users"
      GenerateSecretString:
        SecretStringTemplate: '{"username": "temp_user"}'
        GenerateStringKey: "password"
        PasswordLength: 16
        ExcludeCharacters: '"@/\\'
        RequireEachIncludedType: true

  S3GroupPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: S3ReadOnlyAccess
      Description: "Allows users to list all S3 buckets and get bucket location"
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action:
          - s3:ListAllMyBuckets
          - s3:GetBucketLocation
          Resource:
          - arn:aws:s3:::*

  S3UserGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: S3UserGroup
      ManagedPolicyArns:
      - !Ref S3GroupPolicy
      - arn:aws:iam::aws:policy/IAMUserChangePassword

  EC2GroupPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: EC2GroupAccess
      Description: "Allows users to list and create EC2 instances"
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action:
          - ec2:DescribeInstances
          - ec2:RunInstances
          - ec2:DescribeImages
          - ec2:DescribeKeyPairs
          - ec2:DescribeSecurityGroups
          - ec2:DescribeSubnets
          - ec2:DescribeVpcs
          - ec2:CreateTags
          - ec2:CreateKeyPair
          - ec2:CreateSecurityGroup
          - ec2:AuthorizeSecurityGroupIngress
          - ec2:DescribeAvailabilityZones
          Resource: '*'

  EC2UserGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: EC2UserGroup
      ManagedPolicyArns:
      - !Ref EC2GroupPolicy
      - arn:aws:iam::aws:policy/IAMUserChangePassword

  EC2User1:
    Type: AWS::IAM::User
    Properties:
      UserName: ec2-user1
      LoginProfile:
        Password: !Sub '{{resolve:secretsmanager:${TemporaryCredentialsSecret}:SecretString:password}}'
        PasswordResetRequired: true
      Groups:
      - !Ref EC2UserGroup

  EC2User2:
    Type: AWS::IAM::User
    Properties:
      UserName: ec2-user2
      LoginProfile:
        Password: !Sub '{{resolve:secretsmanager:${TemporaryCredentialsSecret}:SecretString:password}}'
        PasswordResetRequired: true
      Groups:
      - !Ref EC2UserGroup

  S3User:
    Type: AWS::IAM::User
    Properties:
      UserName: s3-user
      LoginProfile:
        Password: !Sub '{{resolve:secretsmanager:${TemporaryCredentialsSecret}:SecretString:password}}'
        PasswordResetRequired: true
      Groups:
      - !Ref S3UserGroup

Outputs:
  TemporaryCredentialsSecretName:
    Description: Name of the Secrets Manager secret storing the temporary password
    Value: !Ref TemporaryCredentialsSecret

  EC2UserGroupName:
    Description: Name of the EC2 IAM group
    Value: !Ref EC2UserGroup

  S3UserGroupName:
    Description: Name of the S3 IAM group
    Value: !Ref S3UserGroup

  EC2GroupPolicyArn:
    Description: ARN of the EC2 managed policy
    Value: !Ref EC2GroupPolicy

  S3GroupPolicyArn:
    Description: ARN of the S3 managed policy
    Value: !Ref S3GroupPolicy

  EC2User1Name:
    Description: IAM username for the first EC2 user
    Value: !Ref EC2User1

  EC2User2Name:
    Description: IAM username for the second EC2 user
    Value: !Ref EC2User2

  S3UserName:
    Description: IAM username for the S3 user
    Value: !Ref S3User
