AWSTemplateFormatVersion: '2010-09-09'
Description: >
  IAM Resources Lab - Creating IAM users, groups, policies, temporary credentials stored in Secrets Manager

Resources:

  TemporaryCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: TemporaryCredentials
      Description: "Temporary credentials for IAM users"
      GenerateSecretString:
        SecretStringTemplate: '{"username": "temp_user"}'
        GenerateStringKey: "password"
        PasswordLength: 16
        ExcludeCharacters: '"@/\\'

  S3GroupPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: S3ReadOnlyAccess
      Description: "Allows users to list all S3 buckets and get bucket location"
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action:
          - s3:ListAllMyBuckets
          - s3:GetBucketLocation
          Resource:
          - arn:aws:s3:::*

  S3UserGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: S3UserGroup
      ManagedPolicyArns:
      - !Ref S3GroupPolicy

  EC2GroupPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: EC2GroupAccess
      Description: "Allows users to list and create EC2 instances"
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action:
          - ec2:DescribeInstances
          - ec2:RunInstances
          - ec2:DescribeImages
          - ec2:DescribeKeyPairs
          - ec2:DescribeSecurityGroups
          - ec2:DescribeSubnets
          - ec2:DescribeVpcs
          Resource: '*'

  EC2UserGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: EC2UserGroup
      ManagedPolicyArns:
      - !Ref EC2GroupPolicy

  EC2User1:
    Type: AWS::IAM::User
    Properties:
      UserName: ec2-user1
      LoginProfile:
        Password: !Sub '{{resolve:secretsmanager:${TemporaryCredentialsSecret}:SecretString:password}}'
        PasswordResetRequired: true
      Groups:
      - !Ref EC2UserGroup
  EC2User2:
    Type: AWS::IAM::User
    Properties:
      UserName: ec2-user2
      LoginProfile:
        Password: !Sub '{{resolve:secretsmanager:${TemporaryCredentialsSecret}:SecretString:password}}'
        PasswordResetRequired: true
      Groups:
      - !Ref EC2UserGroup

  S3User1:
    Type: AWS::IAM::User
    Properties:
      UserName: s3-user1
      LoginProfile:
        Password: !Sub '{{resolve:secretsmanager:${TemporaryCredentialsSecret}:SecretString:password}}'
        PasswordResetRequired: true
      Groups:
      - !Ref S3UserGroup
